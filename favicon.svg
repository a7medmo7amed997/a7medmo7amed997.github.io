<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Left Bracket < Gradient (Emerald-Green) -->
    <linearGradient id="leftCodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/> <!-- Emerald 400 -->
      <stop offset="100%" stop-color="#059669"/> <!-- Emerald 600 -->
    </linearGradient>

    <!-- Right Bracket > Gradient (Cyan-Teal) -->
    <linearGradient id="rightCodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/> <!-- Cyan 400 -->
      <stop offset="100%" stop-color="#0891b2"/> <!-- Cyan 600 -->
    </linearGradient>

    <!-- Core Target Glow -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Shadow for depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- LATITUDE / LONGITUDE SPATIAL COORDINATE GRID (GIS) -->
  <g opacity="0.35" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 6" fill="none">
    <!-- Horizontal Equator line -->
    <line x1="40" y1="280" x2="472" y2="280" />
    <!-- Vertical Meridian line -->
    <line x1="256" y1="40" x2="256" y2="472" />
    
    <!-- Concentric range rings around the target coordinates -->
    <circle cx="256" cy="280" r="140" stroke-width="1" stroke-dasharray="2 4" />
    <circle cx="256" cy="280" r="80" stroke-width="1.25" />
  </g>

  <!-- THE CODE & IDENTITY ENGINE (The Letter 'A' formed by flanking brackets < and >) -->
  <g filter="url(#softShadow)">
    <!-- Left Bracket `<` forming the left leg of 'A' -->
    <polygon 
      points="256,80 110,260 180,430 230,430 170,260 256,155" 
      fill="url(#leftCodeGrad)" 
    />

    <!-- Right Bracket `>` forming the right leg of 'A' -->
    <polygon 
      points="256,80 402,260 332,430 282,430 342,260 256,155" 
      fill="url(#rightCodeGrad)" 
    />
  </g>

  <!-- GIS SPATIAL TARGET LOCK / COMPASS ROSE (Crossbar Connection) -->
  <g id="gis-target" filter="url(#neonGlow)">
    <!-- Linking Crossbar representing horizontal segment / contour road -->
    <line x1="168" y1="280" x2="344" y2="280" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.85" />
    
    <!-- Outer Target reticle circle -->
    <circle cx="256" cy="280" r="32" fill="none" stroke="#34d399" stroke-width="3" stroke-dasharray="6 3" />
    
    <!-- Inner lock circle -->
    <circle cx="256" cy="280" r="16" fill="rgba(52, 211, 153, 0.2)" stroke="#22d3ee" stroke-width="2" />
    
    <!-- Coordinate Core lock point (glowing target dot) -->
    <circle cx="256" cy="280" r="6" fill="#ffffff" />
  </g>

  <!-- Geometric Map Pin Top Pointer Accent -->
  <polygon points="256,40 244,70 268,70" fill="#34d399" opacity="0.9" />
</svg>
